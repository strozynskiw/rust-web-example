version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rust-web-postgres
    environment:
      POSTGRES_USER: rustweb
      POSTGRES_PASSWORD: rustweb
      POSTGRES_DB: rustweb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustweb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:


